server:
  port: 8081

spring:
  application:
    name: authservice

  datasource:
    url: jdbc:postgresql://localhost:5432/pubx_auth
    username: postgres
    password: ayush
    driver-class-name: org.postgresql.Driver

  #JPA/ Hibernate settings
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

jwt:
  secret: pubx-super-secret-key-that-is-at-least-256-bits-long-for-security
  access-token-expiry: 900000       # 15 minutes in milliseconds
  refresh-token-expiry: 604800000

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html