server:
  port: 8082
spring:
  application:
    name: user-service

  datasource:
    url: jdbc:postgresql://localhost:5432/pubx_user
    username: postgres
    password: ayush
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration/userdb
    baseline-on-migrate: true

jwt:
  secret: pubx-super-secret-key-that-is-at-least-256-bits-long-for-security

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html